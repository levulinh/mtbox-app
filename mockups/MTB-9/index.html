<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=375">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 375px; height: 812px; font-family: -apple-system, 'SF Pro Display', sans-serif; background: #FAFAFA; overflow: hidden; }

    /* Status bar */
    .status-bar {
      height: 44px; background: #1E50FF;
      display: flex; align-items: center; padding: 0 20px;
      color: white; font-size: 12px; font-weight: 700;
      justify-content: space-between;
    }
    .status-icons { display: flex; align-items: center; gap: 4px; }
    .status-icons .material-icons { font-size: 14px; }

    /* App bar */
    .app-bar {
      height: 56px; background: #1E50FF;
      display: flex; align-items: center; padding: 0 16px;
      border-bottom: 2px solid #000;
      box-shadow: 0 2px 0 #000;
    }
    .app-bar-title { font-size: 18px; font-weight: 700; color: white; letter-spacing: 1px; text-transform: uppercase; }

    /* Scrollable content area */
    .content {
      height: calc(812px - 44px - 56px - 60px);
      overflow-y: auto;
      padding: 16px;
      padding-bottom: 80px;
    }

    /* Section header */
    .section-header {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: #555;
      border-left: 3px solid #1E50FF;
      padding-left: 8px;
      margin-bottom: 12px;
    }

    /* Campaign card */
    .campaign-card {
      background: #FFFFFF;
      border: 2px solid #000;
      box-shadow: 2px 2px 0 #000;
      padding: 14px;
      margin-bottom: 12px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .campaign-name {
      font-size: 15px; font-weight: 700; color: #000;
      letter-spacing: -0.3px;
    }
    .campaign-goal {
      font-size: 11px; font-weight: 600; color: #555;
      text-transform: uppercase;
      margin-top: 2px;
    }
    .status-badge {
      font-size: 9px; font-weight: 900; text-transform: uppercase;
      padding: 3px 8px; letter-spacing: 0.5px;
      border: 2px solid #000;
    }
    .status-active { background: #1E50FF; color: white; }
    .status-done { background: white; color: #000; }

    /* Progress bar */
    .progress-label-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 5px;
    }
    .progress-day-label {
      font-size: 11px; font-weight: 700; color: #000; text-transform: uppercase;
    }
    .progress-pct-label {
      font-size: 11px; font-weight: 700; color: #1E50FF;
    }
    .progress-bar-track {
      height: 10px; background: #F0F0F0;
      border: 2px solid #000;
      margin-bottom: 8px;
    }
    .progress-bar-fill {
      height: 100%; background: #1E50FF;
    }
    .progress-bar-fill.completed { background: #000; }

    /* Day tick strip */
    .day-ticks {
      display: flex; gap: 2px; flex-wrap: nowrap; overflow: hidden;
    }
    .tick {
      flex: 1; height: 6px;
      border: 1px solid #000;
    }
    .tick-done { background: #1E50FF; }
    .tick-missed { background: white; }
    .tick-future { background: #E8E8E8; border-color: #CCC; }

    /* Empty state */
    .empty-state {
      margin-top: 32px;
      text-align: center;
      padding: 32px 20px;
      border: 2px dashed #CCC;
      background: white;
    }
    .empty-icon { font-size: 48px; color: #CCC; margin-bottom: 12px; }
    .empty-title { font-size: 15px; font-weight: 700; color: #000; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .empty-sub { font-size: 12px; font-weight: 600; color: #555; line-height: 1.5; }
    .empty-hint {
      display: flex; align-items: center; justify-content: center; gap: 4px;
      margin-top: 12px; font-size: 11px; font-weight: 700; color: #1E50FF;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .empty-hint .material-icons { font-size: 16px; }

    /* FAB */
    .fab {
      position: absolute;
      bottom: 76px; right: 16px;
      width: 52px; height: 52px;
      background: #1E50FF;
      border: 2px solid #000;
      box-shadow: 2px 2px 0 #000;
      display: flex; align-items: center; justify-content: center;
      color: white;
    }
    .fab .material-icons { font-size: 28px; }

    /* Bottom nav */
    .bottom-nav {
      position: absolute; bottom: 0; left: 0;
      width: 375px; height: 60px;
      background: white;
      border-top: 2px solid #000;
      display: flex;
    }
    .nav-tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: #555;
      border-right: 2px solid #000;
    }
    .nav-tab:last-child { border-right: none; }
    .nav-tab.active { background: #1E50FF; color: white; }
    .nav-tab .material-icons { font-size: 20px; }
  </style>
</head>
<body>
  <!-- Status Bar -->
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <span class="material-icons">signal_cellular_alt</span>
      <span class="material-icons">wifi</span>
      <span class="material-icons">battery_full</span>
    </div>
  </div>

  <!-- App Bar -->
  <div class="app-bar">
    <span class="app-bar-title">Campaigns</span>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="section-header">Active — 2 campaigns</div>

    <!-- Campaign Card 1: In progress -->
    <div class="campaign-card">
      <div class="card-header">
        <div>
          <div class="campaign-name">Morning Run</div>
          <div class="campaign-goal">Goal: 30 days</div>
        </div>
        <div class="status-badge status-active">Active</div>
      </div>
      <div class="progress-label-row">
        <span class="progress-day-label">Day 18 of 30</span>
        <span class="progress-pct-label">60%</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" style="width: 60%;"></div>
      </div>
      <div class="day-ticks">
        <!-- 18 done, 12 future (30 total) -->
        <div class="tick tick-done"></div><div class="tick tick-done"></div><div class="tick tick-done"></div>
        <div class="tick tick-done"></div><div class="tick tick-done"></div><div class="tick tick-done"></div>
        <div class="tick tick-done"></div><div class="tick tick-done"></div><div class="tick tick-done"></div>
        <div class="tick tick-done"></div><div class="tick tick-done"></div><div class="tick tick-done"></div>
        <div class="tick tick-done"></div><div class="tick tick-done"></div><div class="tick tick-done"></div>
        <div class="tick tick-done"></div><div class="tick tick-done"></div><div class="tick tick-done"></div>
        <div class="tick tick-future"></div><div class="tick tick-future"></div><div class="tick tick-future"></div>
        <div class="tick tick-future"></div><div class="tick tick-future"></div><div class="tick tick-future"></div>
        <div class="tick tick-future"></div><div class="tick tick-future"></div><div class="tick tick-future"></div>
        <div class="tick tick-future"></div><div class="tick tick-future"></div><div class="tick tick-future"></div>
      </div>
    </div>

    <!-- Campaign Card 2: Early stage with a missed day -->
    <div class="campaign-card">
      <div class="card-header">
        <div>
          <div class="campaign-name">Read Daily</div>
          <div class="campaign-goal">Goal: 21 days</div>
        </div>
        <div class="status-badge status-active">Active</div>
      </div>
      <div class="progress-label-row">
        <span class="progress-day-label">Day 5 of 21</span>
        <span class="progress-pct-label">24%</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" style="width: 24%;"></div>
      </div>
      <div class="day-ticks">
        <!-- 4 done, 1 missed, 16 future -->
        <div class="tick tick-done"></div><div class="tick tick-done"></div><div class="tick tick-done"></div>
        <div class="tick tick-done"></div><div class="tick tick-missed"></div>
        <div class="tick tick-future"></div><div class="tick tick-future"></div><div class="tick tick-future"></div>
        <div class="tick tick-future"></div><div class="tick tick-future"></div><div class="tick tick-future"></div>
        <div class="tick tick-future"></div><div class="tick tick-future"></div><div class="tick tick-future"></div>
        <div class="tick tick-future"></div><div class="tick tick-future"></div><div class="tick tick-future"></div>
        <div class="tick tick-future"></div><div class="tick tick-future"></div><div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
      </div>
    </div>

    <!-- Section: Completed -->
    <div class="section-header" style="margin-top: 8px;">Completed — 1 campaign</div>

    <!-- Campaign Card 3: Completed -->
    <div class="campaign-card">
      <div class="card-header">
        <div>
          <div class="campaign-name">Meditate</div>
          <div class="campaign-goal">Goal: 7 days</div>
        </div>
        <div class="status-badge status-done">Done</div>
      </div>
      <div class="progress-label-row">
        <span class="progress-day-label">Day 7 of 7</span>
        <span class="progress-pct-label" style="color:#000;">100%</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill completed" style="width: 100%;"></div>
      </div>
      <div class="day-ticks">
        <div class="tick tick-done"></div><div class="tick tick-done"></div><div class="tick tick-done"></div>
        <div class="tick tick-done"></div><div class="tick tick-done"></div><div class="tick tick-done"></div>
        <div class="tick tick-done"></div>
      </div>
    </div>
  </div>

  <!-- FAB -->
  <div class="fab">
    <span class="material-icons">add</span>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-tab">
      <span class="material-icons">home</span>
      <span>Home</span>
    </div>
    <div class="nav-tab active">
      <span class="material-icons">flag</span>
      <span>Campaigns</span>
    </div>
    <div class="nav-tab">
      <span class="material-icons">person</span>
      <span>Profile</span>
    </div>
  </div>
</body>
</html>

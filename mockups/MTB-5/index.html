<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=375">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 375px;
      height: 812px;
      font-family: -apple-system, 'SF Pro Display', sans-serif;
      background: #FAFAFA;
      overflow: hidden;
      position: relative;
    }

    /* Status Bar */
    .status-bar {
      height: 44px;
      background: #1E50FF;
      display: flex;
      align-items: center;
      padding: 0 16px;
      color: white;
      font-size: 12px;
      font-weight: 700;
      justify-content: space-between;
    }
    .status-time { font-size: 13px; font-weight: 700; }
    .status-icons { display: flex; align-items: center; gap: 4px; }
    .status-icons .material-icons { font-size: 16px; color: white; }

    /* App Bar */
    .app-bar {
      height: 56px;
      background: #1E50FF;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 2px solid #000;
      box-shadow: 0 2px 0 #000;
    }
    .app-bar-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Scrollable content */
    .content {
      height: calc(812px - 44px - 56px - 60px);
      overflow-y: auto;
      padding: 16px 16px 0;
    }
    .content::-webkit-scrollbar { display: none; }

    /* Section header */
    .section-header {
      border-left: 3px solid #1E50FF;
      padding-left: 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: #555;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
      margin-top: 4px;
    }

    /* Campaign Card */
    .card {
      background: #fff;
      border: 2px solid #000;
      box-shadow: 2px 2px 0 #000;
      padding: 12px 12px 10px;
      margin-bottom: 12px;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .card-name {
      font-size: 15px;
      font-weight: 700;
      color: #000;
      letter-spacing: -0.2px;
      flex: 1;
      padding-right: 8px;
    }

    /* Status badge */
    .badge {
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 3px 6px;
      border: 2px solid #000;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-active { background: #1E50FF; color: #fff; border-color: #1E50FF; }
    .badge-completed { background: #fff; color: #000; border-color: #000; }

    /* Progress row */
    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }
    .progress-label {
      font-size: 11px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .progress-pct {
      font-size: 11px;
      font-weight: 700;
      color: #000;
    }

    /* Progress bar */
    .progress-track {
      width: 100%;
      height: 10px;
      background: #fff;
      border: 2px solid #000;
      margin-bottom: 6px;
      position: relative;
    }
    .progress-fill-active {
      height: 100%;
      background: #1E50FF;
    }
    .progress-fill-completed {
      height: 100%;
      background: #000;
    }

    /* Day tick strip */
    .tick-strip {
      display: flex;
      gap: 2px;
      flex-wrap: nowrap;
      overflow: hidden;
    }
    .tick {
      width: 7px;
      height: 7px;
      border: 1px solid #ccc;
      flex-shrink: 0;
    }
    .tick-done { background: #1E50FF; border-color: #1E50FF; }
    .tick-missed { background: #fff; border-color: #000; }
    .tick-future { background: #E8E8E8; border-color: #E8E8E8; }
    .tick-done-black { background: #000; border-color: #000; }

    /* Empty state card */
    .empty-card {
      border: 2px dashed #999;
      padding: 20px 16px;
      text-align: center;
      margin-bottom: 12px;
    }
    .empty-card .material-icons {
      font-size: 28px;
      color: #999;
      display: block;
      margin-bottom: 8px;
    }
    .empty-card-text {
      font-size: 12px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #fff;
      border-top: 2px solid #000;
      display: flex;
    }
    .nav-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      border-right: 2px solid #000;
      cursor: pointer;
    }
    .nav-tab:last-child { border-right: none; }
    .nav-tab.active {
      background: #1E50FF;
    }
    .nav-tab .material-icons {
      font-size: 22px;
      color: #000;
    }
    .nav-tab.active .material-icons { color: #fff; }
    .nav-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #000;
    }
    .nav-tab.active .nav-label { color: #fff; }

    /* FAB */
    .fab {
      position: absolute;
      bottom: 76px;
      right: 16px;
      width: 52px;
      height: 52px;
      background: #1E50FF;
      border: 2px solid #000;
      box-shadow: 2px 2px 0 #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fab .material-icons { font-size: 26px; color: #fff; }

    .section-gap { height: 4px; }
  </style>
</head>
<body>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <span class="material-icons">signal_cellular_alt</span>
      <span class="material-icons">wifi</span>
      <span class="material-icons">battery_full</span>
    </div>
  </div>

  <!-- App Bar -->
  <div class="app-bar">
    <span class="app-bar-title">Campaigns</span>
  </div>

  <!-- Scrollable Content -->
  <div class="content">

    <!-- ACTIVE Section -->
    <div class="section-header">Active (2)</div>

    <!-- Campaign Card 1: Exercise Daily -->
    <div class="card">
      <div class="card-header">
        <div class="card-name">Exercise Daily</div>
        <div class="badge badge-active">Active</div>
      </div>
      <div class="progress-meta">
        <span class="progress-label">Day 12 of 30</span>
        <span class="progress-pct">40%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill-active" style="width: 40%"></div>
      </div>
      <!-- 30-day tick strip: 11 done (blue), 1 missed (white), 18 future -->
      <div class="tick-strip">
        <div class="tick tick-done"></div>
        <div class="tick tick-done"></div>
        <div class="tick tick-done"></div>
        <div class="tick tick-done"></div>
        <div class="tick tick-done"></div>
        <div class="tick tick-done"></div>
        <div class="tick tick-done"></div>
        <div class="tick tick-done"></div>
        <div class="tick tick-done"></div>
        <div class="tick tick-done"></div>
        <div class="tick tick-done"></div>
        <div class="tick tick-missed"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
      </div>
    </div>

    <!-- Campaign Card 2: Read Every Day -->
    <div class="card">
      <div class="card-header">
        <div class="card-name">Read Every Day</div>
        <div class="badge badge-active">Active</div>
      </div>
      <div class="progress-meta">
        <span class="progress-label">Day 5 of 21</span>
        <span class="progress-pct">24%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill-active" style="width: 24%"></div>
      </div>
      <!-- 21-day tick strip: 5 done, 16 future -->
      <div class="tick-strip">
        <div class="tick tick-done"></div>
        <div class="tick tick-done"></div>
        <div class="tick tick-done"></div>
        <div class="tick tick-done"></div>
        <div class="tick tick-done"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
        <div class="tick tick-future"></div>
      </div>
    </div>

    <!-- COMPLETED Section -->
    <div class="section-gap"></div>
    <div class="section-header">Completed (1)</div>

    <!-- Campaign Card 3: No Sugar Challenge -->
    <div class="card">
      <div class="card-header">
        <div class="card-name">No Sugar Challenge</div>
        <div class="badge badge-completed">Completed</div>
      </div>
      <div class="progress-meta">
        <span class="progress-label">Day 14 of 14</span>
        <span class="progress-pct">100%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill-completed" style="width: 100%"></div>
      </div>
      <!-- 14-day tick strip: all done (black) -->
      <div class="tick-strip">
        <div class="tick tick-done-black"></div>
        <div class="tick tick-done-black"></div>
        <div class="tick tick-done-black"></div>
        <div class="tick tick-done-black"></div>
        <div class="tick tick-done-black"></div>
        <div class="tick tick-done-black"></div>
        <div class="tick tick-done-black"></div>
        <div class="tick tick-done-black"></div>
        <div class="tick tick-done-black"></div>
        <div class="tick tick-done-black"></div>
        <div class="tick tick-done-black"></div>
        <div class="tick tick-done-black"></div>
        <div class="tick tick-done-black"></div>
        <div class="tick tick-done-black"></div>
      </div>
    </div>

  </div>

  <!-- FAB -->
  <div class="fab">
    <span class="material-icons">add</span>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-tab">
      <span class="material-icons">home</span>
      <span class="nav-label">Home</span>
    </div>
    <div class="nav-tab active">
      <span class="material-icons">flag</span>
      <span class="nav-label">Campaigns</span>
    </div>
    <div class="nav-tab">
      <span class="material-icons">person</span>
      <span class="nav-label">Profile</span>
    </div>
  </div>

</body>
</html>
